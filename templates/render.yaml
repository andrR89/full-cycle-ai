# =============================================================================
# TEMPLATE: Copy this file to the ROOT of your target repository.
# Render reads this file automatically when you connect the repo.
# Defines backend (Node.js), frontend (React/Vite) and PostgreSQL.
# =============================================================================

services:
  - type: web
    name: app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: app-db
          property: connectionString
      - key: PORT
        value: 3000

# NOTE: Static sites are not supported in Render Blueprints.
# Create the frontend manually in Render Dashboard:
#   New > Static Site > connect repo > rootDir: frontend
#   Build: npm install && npm run build  |  Publish: dist

databases:
  - name: app-db
    databaseName: appdb
    user: appdb
    plan: free
