name: AI Issue Solver

on:
  repository_dispatch:
    types: [solve-issue]
  issues:
    types: [labeled]

jobs:
  solve-issue:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-solve'))

    permissions:
      issues: write
      contents: write
      pull-requests: write
      checks: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Agent Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # repository_dispatch payload takes priority; fallback to issue event
          GITHUB_REPO: ${{ github.event.client_payload.repo_name || github.repository }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number || github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title || github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.client_payload.issue_body || github.event.issue.body }}
          ISSUE_URL: ${{ github.event.client_payload.issue_url || github.event.issue.html_url }}
        run: PYTHONPATH=${{ github.workspace }} python src/main.py

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.event.client_payload.issue_number || github.event.issue.number }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
