# =============================================================================
# TEMPLATE: Copy this file to .github/workflows/trigger-ai-pipeline.yml
# in any project you want the AI pipeline to solve issues for.
#
# Required secret in the target repo:
#   PIPELINE_PAT — GitHub Personal Access Token with access to andrR89/full-cycle-ai
# =============================================================================

name: Trigger AI Pipeline

on:
  issues:
    types: [labeled]

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ai-solve'

    steps:
      - name: Dispatch to AI Pipeline
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'andrR89',
              repo: 'full-cycle-ai',
              event_type: 'solve-issue',
              client_payload: {
                repo_name: context.repo.owner + '/' + context.repo.repo,
                issue_number: context.payload.issue.number,
                issue_title: context.payload.issue.title,
                issue_body: context.payload.issue.body,
                issue_url: context.payload.issue.html_url
              }
            });
            core.info(`Dispatched issue #${context.payload.issue.number} to AI pipeline`);
